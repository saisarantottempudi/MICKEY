# MICKEY nginx reverse proxy config
# Install: brew install nginx
# Setup:
#   1. Get Tailscale HTTPS certs: tailscale cert <hostname>
#   2. Copy this to /opt/homebrew/etc/nginx/servers/mickey.conf
#   3. Update ssl_certificate paths with your Tailscale hostname
#   4. nginx -s reload
#
# This proxies HTTPS requests to Flask (5050) and Vite dev server (5173)

server {
    listen 443 ssl;
    # Replace with your Tailscale hostname (e.g., mickeys-mbp.tail12345.ts.net)
    server_name TAILSCALE_HOSTNAME;

    # Tailscale HTTPS certs (generated by `tailscale cert <hostname>`)
    ssl_certificate     /Users/mickey/MICKEY/config/TAILSCALE_HOSTNAME.crt;
    ssl_certificate_key /Users/mickey/MICKEY/config/TAILSCALE_HOSTNAME.key;

    # Frontend (React dev server or built files)
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (Socket.IO)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name TAILSCALE_HOSTNAME;
    return 301 https://$host$request_uri;
}
